<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ESTACIONE COLOMBO - Oficial</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        * { -webkit-tap-highlight-color: transparent; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background-color: #f3f4f6; padding-bottom: 90px; }
        .zazul-green { background-color: #15711b; }
        .zazul-text-green { color: #15711b; }
        .btn-zazul { background-color: #15711b; color: white; border-radius: 1rem; font-weight: 700; text-transform: uppercase; }
        .aba-content { display: none; }
        .aba-content.active { display: block; animation: fadeIn 0.3s ease; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        .card-app { background: white; border-radius: 1.25rem; padding: 1.25rem; border: 1px solid #e5e7eb; }
        .nav-bottom { position: fixed; bottom: 0; left: 0; right: 0; background: white; border-top: 1px solid #e5e7eb; display: flex; padding: 12px 0 20px 0; z-index: 50; }
        .nav-item { flex: 1; display: flex; flex-direction: column; align-items: center; font-size: 11px; font-weight: 700; color: #6b7280; }
        .nav-item.active { color: #15711b; }
    </style>
</head>
<body>

    <div id="tela-login" class="fixed inset-0 z-[100] bg-white flex flex-col p-6 items-center justify-center">
        <div class="w-full max-w-md space-y-6 text-center">
            <div class="zazul-green w-20 h-20 rounded-3xl mx-auto flex items-center justify-center shadow-lg"><span class="text-white text-4xl font-black">E</span></div>
            <h2 class="text-2xl font-black zazul-text-green uppercase">Entrar no Sistema</h2>
            <div class="space-y-3">
                <input type="email" id="login-email" placeholder="E-mail" class="w-full p-4 border rounded-2xl font-bold bg-gray-50 outline-none">
                <input type="password" id="login-senha" placeholder="Senha" class="w-full p-4 border rounded-2xl font-bold bg-gray-50 outline-none">
                <button onclick="fazerLogin()" class="w-full btn-zazul py-4 text-lg">Acessar Conta</button>
            </div>
        </div>
    </div>

    <header class="zazul-green text-white p-4 flex justify-between items-center sticky top-0 z-40">
        <div class="w-10"></div>
        <h1 class="text-lg font-black tracking-widest uppercase">Estacione Colombo</h1>
        <button onclick="fazerLogout()" class="text-[10px] font-bold border border-white/30 px-3 py-1 rounded-lg">Sair</button>
    </header>

    <main id="app-container" class="max-w-md mx-auto p-4 space-y-4">
        
        <section id="aba-estacionar" class="aba-content active space-y-4">
            <div class="card-app text-center py-6">
                <p class="text-gray-500 font-bold text-sm uppercase">Saldo Disponível</p>
                <h2 class="text-4xl font-black text-black my-2" id="saldo-display">R$ 0,00</h2>
                <button onclick="mudarAba('aba-recarga')" class="mt-2 text-xs font-bold text-green-700 underline uppercase">Recarregar agora</button>
            </div>

            <div id="form-estacionar" class="space-y-4">
                <div class="card-app bg-gray-50 border-dashed border-2 text-center" onclick="mudarAba('aba-veiculos')">
                    <p class="text-[10px] font-bold text-gray-400 uppercase">Veículo Selecionado</p>
                    <h3 class="text-3xl font-black text-black" id="placa-view">SELECIONE</h3>
                </div>
                
                <div id="localizacao-box" class="w-full p-4 border rounded-2xl font-bold text-sm bg-blue-50 text-blue-700 text-center border-blue-200 shadow-sm">
                    <span id="txt-local">📍 LOCALIZANDO...</span>
                </div>

                <div class="grid grid-cols-2 gap-3">
                    <select id="zona-select" class="w-full p-4 border rounded-2xl font-bold text-sm bg-white border-gray-200">
                        <option value="3.50">Setor 1 (R$ 3,50)</option>
                        <option value="2.00">Setor 2 (R$ 2,00)</option>
                    </select>
                    <select id="tempo-select" class="w-full p-4 border rounded-2xl font-bold text-sm bg-white border-gray-200">
                        <option value="1">1 Hora</option>
                        <option value="2">2 Horas</option>
                    </select>
                </div>
                <button id="btn-estacionar-main" onclick="ativarVaga()" class="w-full btn-zazul py-5 text-lg shadow-xl opacity-50 pointer-events-none">Aguardando Localização...</button>
            </div>

            <div id="vaga-ativa-box" class="hidden space-y-4">
                <div class="card-app border-2 border-green-600 text-center bg-green-50/30">
                    <p class="text-green-600 font-black text-xs uppercase">Estacionamento Ativo</p>
                    <h3 id="placa-ativa-label" class="text-4xl font-black my-3 tracking-tighter">---</h3>
                    <div class="grid grid-cols-2 gap-4 mt-4 border-t pt-4">
                        <div><p class="text-[10px] text-gray-400 font-bold uppercase">Custo</p><span class="font-black text-xl text-black" id="custo-vaga">R$ 0,00</span></div>
                        <div><p class="text-[10px] text-gray-400 font-bold uppercase">Tempo Restante</p><span id="cronometro" class="font-black text-xl text-blue-600">--:--</span></div>
                    </div>
                </div>
                <button onclick="sairDaVaga()" class="w-full bg-red-600 text-white py-5 rounded-2xl font-black uppercase shadow-lg">Encerrar Vaga</button>
            </div>
        </section>

        <section id="aba-veiculos" class="aba-content space-y-4">
            <h3 class="zazul-text-green font-black uppercase text-sm">Meus Veículos</h3>
            <div class="card-app space-y-4">
                <input type="text" id="input-placa" placeholder="PLACA (ABC1D23)" class="w-full p-4 border-2 rounded-2xl font-black text-center text-2xl uppercase border-gray-100">
                <button onclick="salvarNovoVeiculo()" class="w-full btn-zazul py-4">Adicionar Veículo</button>
            </div>
            <div id="lista-veiculos" class="space-y-2"></div>
        </section>

        <section id="aba-recarga" class="aba-content space-y-4">
             <h3 class="zazul-text-green font-black uppercase text-sm text-center">Comprar Créditos</h3>
             <div class="grid grid-cols-2 gap-4">
                <button onclick="alert('PIX: 123.456.789-00')" class="card-app font-black text-xl border-green-200">R$ 10,00</button>
                <button onclick="alert('PIX: 123.456.789-00')" class="card-app font-black text-xl border-green-200">R$ 20,00</button>
             </div>
        </section>

    </main>

    <nav class="nav-bottom">
        <button onclick="mudarAba('aba-veiculos', this)" class="nav-item">🚗 Veículos</button>
        <button onclick="mudarAba('aba-estacionar', this)" class="nav-item active">🏠 Início</button>
        <button onclick="mudarAba('aba-recarga', this)" class="nav-item">💰 Carteira</button>
    </nav>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, onAuthStateChanged, signInWithEmailAndPassword, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getDatabase, ref, onValue, update, push, remove } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        // CONFIGURAÇÃO FIREBASE (Usando seus dados do print)
        const firebaseConfig = { 
            apiKey: "AIzaSyDS2D6-KCvsJomst0m2qs3J93UEq3kWw1Q", 
            authDomain: "estacione-6cfbf.firebaseapp.com", 
            databaseURL: "https://estacione-6cfbf-default-rtdb.firebaseio.com", 
            projectId: "estacione-6cfbf", 
            appId: "1:490946040222:web:0071714b8e6d645459468f" 
        };
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getDatabase(app);

        let currentUser = null;
        let saldoLocal = 0;
        let estaNaArea = false;

        // --- SISTEMA DE LOCALIZAÇÃO ---
        function verificarLocalizacao() {
            if (!navigator.geolocation) return alert("Seu navegador não suporta GPS.");

            navigator.geolocation.watchPosition((pos) => {
                const lat = pos.coords.latitude;
                const lon = pos.coords.longitude;

                // CHAMA API NOMINATIM PARA PEGAR RUA E NÚMERO
                fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${lat}&lon=${lon}`)
                .then(r => r.json())
                .then(data => {
                    const rua = data.address.road || "Rua Desconhecida";
                    const num = data.address.house_number || "S/N";
                    const bairro = data.address.suburb || "";
                    
                    // Lógica de Validação: Exemplo para Colombo (ajuste as coordenadas se necessário)
                    // Aqui definimos se o usuário está dentro da cidade permitida
                    if (data.address.city === "Colombo" || data.address.town === "Colombo") {
                        estaNaArea = true;
                        document.getElementById('txt-local').innerHTML = `📍 ${rua}, ${num} - ${bairro}`;
                        document.getElementById('localizacao-box').className = "w-full p-4 border rounded-2xl font-bold text-sm bg-green-50 text-green-700 text-center border-green-200";
                        document.getElementById('btn-estacionar-main').classList.remove('opacity-50', 'pointer-events-none');
                        document.getElementById('btn-estacionar-main').innerText = "ESTACIONAR AGORA";
                    } else {
                        estaNaArea = false;
                        document.getElementById('txt-local').innerHTML = `❌ FORA DA ÁREA PERMITIDA (${data.address.city || 'Desconhecido'})`;
                        document.getElementById('localizacao-box').className = "w-full p-4 border rounded-2xl font-bold text-sm bg-red-50 text-red-700 text-center border-red-200";
                        document.getElementById('btn-estacionar-main').classList.add('opacity-50', 'pointer-events-none');
                        document.getElementById('btn-estacionar-main').innerText = "FORA DA ÁREA";
                    }
                });
            }, (err) => {
                document.getElementById('txt-local').innerText = "❌ ERRO AO ACESSAR GPS";
            }, { enableHighAccuracy: true });
        }

        // --- LÓGICA DO FIREBASE ---
        onAuthStateChanged(auth, (user) => {
            if (user) {
                currentUser = user;
                document.getElementById('tela-login').classList.add('hidden');
                verificarLocalizacao(); // Inicia GPS ao logar
                
                onValue(ref(db, `usuarios/${user.uid}`), (snap) => {
                    const data = snap.val();
                    saldoLocal = data?.saldo || 0;
                    document.getElementById('saldo-display').innerText = `R$ ${saldoLocal.toFixed(2).replace('.',',')}`;
                    
                    if (data?.vagaAtiva) {
                        document.getElementById('form-estacionar').classList.add('hidden');
                        document.getElementById('vaga-ativa-box').classList.remove('hidden');
                        document.getElementById('placa-ativa-label').innerText = data.vagaAtiva.placa;
                        document.getElementById('custo-vaga').innerText = `R$ ${data.vagaAtiva.valorHora.toFixed(2)}`;
                    } else {
                        document.getElementById('form-estacionar').classList.remove('hidden');
                        document.getElementById('vaga-ativa-box').classList.add('hidden');
                    }
                    carregarVeiculos(user.uid);
                });
            } else {
                document.getElementById('tela-login').classList.remove('hidden');
            }
        });

        window.fazerLogin = () => {
            const e = document.getElementById('login-email').value;
            const s = document.getElementById('login-senha').value;
            signInWithEmailAndPassword(auth, e, s).catch(err => alert("Falha no login: " + err.message));
        };

        window.ativarVaga = async () => {
            const placa = document.getElementById('placa-view').innerText;
            if (placa === "SELECIONE") return alert("Selecione um veículo na aba Carros.");
            if (!estaNaArea) return alert("Você não está em uma área de Área Azul permitida.");
            
            const valor = parseFloat(document.getElementById('zona-select').value);
            if (saldoLocal < valor) return alert("Saldo insuficiente!");

            await update(ref(db, `usuarios/${currentUser.uid}/vagaAtiva`), {
                placa,
                valorHora: valor,
                inicio: Date.now(),
                endereco: document.getElementById('txt-local').innerText
            });
            // Aqui você subtrairia o saldo se quiser cobrança antecipada
        };

        window.sairDaVaga = () => {
            if(confirm("Deseja encerrar o estacionamento?")) {
                remove(ref(db, `usuarios/${currentUser.uid}/vagaAtiva`));
            }
        };

        window.mudarAba = (id, btn) => {
            document.querySelectorAll('.aba-content').forEach(a => a.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            if(btn) btn.classList.add('active');
        };

        // --- VEÍCULOS ---
        window.salvarNovoVeiculo = async () => {
            const p = document.getElementById('input-placa').value.toUpperCase();
            if (p.length < 7) return alert("Placa inválida");
            await push(ref(db, `usuarios/${currentUser.uid}/veiculos`), { placa: p });
            document.getElementById('input-placa').value = "";
            alert("Veículo salvo!");
        };

        function carregarVeiculos(uid) {
            onValue(ref(db, `usuarios/${uid}/veiculos`), (snap) => {
                const list = document.getElementById('lista-veiculos');
                list.innerHTML = "";
                const data = snap.val();
                if (data) {
                    Object.entries(data).forEach(([key, v]) => {
                        list.innerHTML += `
                            <div class="card-app flex justify-between items-center">
                                <span class="text-xl font-black">${v.placa}</span>
                                <button onclick="selecionarVeiculo('${v.placa}')" class="bg-blue-600 text-white px-4 py-2 rounded-xl font-bold text-xs uppercase">Selecionar</button>
                            </div>`;
                    });
                }
            });
        }

        window.selecionarVeiculo = (p) => {
            document.getElementById('placa-view').innerText = p;
            mudarAba('aba-estacionar');
            document.getElementById('btn-nav-estacionar').classList.add('active');
        };

        window.fazerLogout = () => signOut(auth);

    </script>
</body>
</html>
