<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ESTACIONE COLOMBO - Área Azul</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        * { -webkit-tap-highlight-color: transparent; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background-color: #f3f4f6; padding-bottom: 90px; overflow-x: hidden; width: 100%; }
        .zazul-green { background-color: #15711b; }
        .zazul-text-green { color: #15711b; }
        .nav-bottom { position: fixed; bottom: 0; left: 0; right: 0; background: white; border-top: 1px solid #e5e7eb; display: flex; justify-content: space-around; padding: 12px 0 20px 0; z-index: 50; }
        .nav-item { display: flex; flex-direction: column; align-items: center; font-size: 11px; font-weight: 700; color: #6b7280; text-transform: uppercase; border: none; background: none; flex: 1; }
        .nav-item.active { color: #15711b; }
        .btn-zazul { background-color: #15711b; color: white; border-radius: 1rem; font-weight: 700; text-transform: uppercase; transition: transform 0.1s; }
        .btn-zazul:active { transform: scale(0.98); }
        .aba-content { display: none; width: 100%; animation: fadeIn 0.3s ease; }
        .aba-content.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .card-app { background: white; border-radius: 1.25rem; padding: 1.25rem; border: 1px solid #e5e7eb; }
        .btn-value.active { border-color: #15711b; background-color: #f0fdf4; color: #15711b; }
    </style>
</head>
<body>

    <div id="tela-login" class="fixed inset-0 z-[100] bg-white flex flex-col p-6 items-center justify-center">
        <div class="w-full max-w-md space-y-6 text-center">
            <div class="zazul-green w-20 h-20 rounded-3xl mx-auto flex items-center justify-center shadow-lg"><span class="text-white text-4xl font-black">E</span></div>
            <h2 class="text-2xl font-black zazul-text-green uppercase">Entrar no Sistema</h2>
            <div class="space-y-3">
                <input type="email" id="login-email" placeholder="E-mail" class="w-full p-4 border rounded-2xl font-bold bg-gray-50 outline-none">
                <input type="password" id="login-senha" placeholder="Senha" class="w-full p-4 border rounded-2xl font-bold bg-gray-50 outline-none">
                <button onclick="fazerLogin()" class="w-full btn-zazul py-4 text-lg">Acessar Conta</button>
            </div>
        </div>
    </div>

    <header class="zazul-green text-white p-4 flex justify-between items-center sticky top-0 z-40">
        <div class="w-10"></div> <h1 class="text-lg font-black tracking-widest uppercase">Estacione Colombo</h1>
        <button onclick="fazerLogout()" class="text-[10px] font-bold border border-white/30 px-3 py-1 rounded-lg">Sair</button>
    </header>

    <main id="app-container" class="max-w-md mx-auto p-4 space-y-4">
        <section id="aba-estacionar" class="aba-content active space-y-4">
            <div class="card-app text-center py-6">
                <p class="text-gray-500 font-bold text-sm uppercase">Saldo Disponível</p>
                <h2 class="text-4xl font-black text-black my-2" id="saldo-display">R$ 0,00</h2>
                <button onclick="mudarAba('aba-recarga')" class="mt-4 btn-zazul px-8 py-4 w-full">Comprar Créditos</button>
            </div>

            <div id="form-estacionar" class="space-y-4">
                <div class="card-app bg-gray-50 border-dashed border-2 text-center">
                    <p class="text-[10px] font-bold text-gray-400 uppercase">Veículo Selecionado</p>
                    <h3 class="text-3xl font-black text-black" id="placa-view">SELECIONE</h3>
                </div>
                
                <div class="w-full p-3 border rounded-xl font-bold text-xs bg-blue-50 text-blue-600 text-center border-blue-100 uppercase">
                    📍 Centro de Colombo - Área Ativa
                </div>

                <div class="grid grid-cols-2 gap-3">
                    <select id="zona-select" class="w-full p-4 border rounded-2xl font-bold text-sm bg-white">
                        <option value="3.50">Setor 1 (R$ 3,50)</option>
                        <option value="2.00">Setor 2 (R$ 2,00)</option>
                    </select>
                    <select id="tempo-select" class="w-full p-4 border rounded-2xl font-bold text-sm bg-white">
                        <option value="1">1 Hora</option>
                        <option value="2">2 Horas</option>
                    </select>
                </div>
                <button onclick="ativarVaga()" class="w-full btn-zazul py-5 text-lg shadow-xl">Estacionar Agora</button>
            </div>

            <div id="vaga-ativa-box" class="hidden space-y-4">
                <div class="card-app border-2 border-green-600 text-center bg-green-50/30">
                    <p class="text-green-600 font-black text-xs uppercase">Vaga Ativa</p>
                    <h3 id="placa-ativa-label" class="text-4xl font-black my-3">---</h3>
                    <div class="grid grid-cols-2 gap-4 mt-4 border-t pt-4">
                        <div><p class="text-[10px] text-gray-400 font-bold uppercase">Custo</p><span id="valor-correndo" class="font-black text-xl">R$ 0,00</span></div>
                        <div><p class="text-[10px] text-gray-400 font-bold uppercase">Restante</p><span id="cronometro" class="font-black text-xl text-blue-600">00:00</span></div>
                    </div>
                </div>
                <button onclick="sairDaVaga()" class="w-full bg-red-600 text-white py-5 rounded-2xl font-black uppercase">Encerrar Vaga</button>
            </div>
        </section>

        <section id="aba-veiculos" class="aba-content space-y-4">
            <h3 class="zazul-text-green font-black uppercase text-sm px-1">Meus Veículos</h3>
            <div class="card-app space-y-4">
                <input type="text" id="input-placa" placeholder="PLACA" class="w-full p-4 border-2 rounded-2xl font-black text-center text-2xl uppercase">
                <input type="text" id="input-modelo" placeholder="MODELO" class="w-full p-4 border rounded-2xl text-sm font-semibold">
                <button onclick="salvarNovoVeiculo()" class="w-full btn-zazul py-4">Salvar Veículo</button>
            </div>
            <div id="lista-veiculos" class="space-y-3"></div>
        </section>
        
        <section id="aba-recarga" class="aba-content space-y-4">
            <h3 class="zazul-text-green font-black uppercase text-sm text-center">Selecione o Valor</h3>
            <div class="grid grid-cols-3 gap-3">
                <button onclick="selVal(5, this)" class="card-app font-bold btn-value">R$ 5</button>
                <button onclick="selVal(10, this)" class="card-app font-bold btn-value">R$ 10</button>
                <button onclick="selVal(20, this)" class="card-app font-bold btn-value">R$ 20</button>
            </div>
            <button onclick="gerarPixReal()" id="btn-gerar" disabled class="w-full btn-zazul py-5 opacity-50">Gerar PIX</button>
        </section>
    </main>

    <nav class="nav-bottom">
        <button onclick="mudarAba('aba-veiculos', this)" class="nav-item">Carros</button>
        <button onclick="mudarAba('aba-estacionar', this)" id="btn-nav-estacionar" class="nav-item active">Início</button>
        <button onclick="mudarAba('aba-historico', this)" class="nav-item">Recibos</button>
    </nav>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, onAuthStateChanged, signInWithEmailAndPassword, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getDatabase, ref, onValue, update, remove, push } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = { apiKey: "AIzaSyDS2D6-KCvsJomst0m2qs3J93UEq3kWw1Q", authDomain: "estacione-6cfbf.firebaseapp.com", databaseURL: "https://estacione-6cfbf-default-rtdb.firebaseio.com", projectId: "estacione-6cfbf", appId: "1:490946040222:web:0071714b8e6d645459468f" };
        const app = initializeApp(firebaseConfig); const auth = getAuth(app); const db = getDatabase(app);

        let currentUser = null; let saldoLocal = 0; let timer = null;

        onAuthStateChanged(auth, (u) => {
            if (u) {
                currentUser = u; document.getElementById('tela-login').classList.add('hidden');
                onValue(ref(db, `usuarios/${u.uid}`), (snap) => {
                    const d = snap.val(); saldoLocal = d?.saldo || 0;
                    document.getElementById('saldo-display').innerText = `R$ ${saldoLocal.toFixed(2).replace('.',',')}`;
                    if (d?.vagaAtiva) {
                        document.getElementById('form-estacionar').classList.add('hidden');
                        document.getElementById('vaga-ativa-box').classList.remove('hidden');
                        document.getElementById('placa-ativa-label').innerText = d.vagaAtiva.placa;
                    } else {
                        document.getElementById('vaga-ativa-box').classList.add('hidden');
                        document.getElementById('form-estacionar').classList.remove('hidden');
                    }
                    carregarVeiculos(u.uid);
                });
            } else { document.getElementById('tela-login').classList.remove('hidden'); }
        });

        window.fazerLogin = () => {
            signInWithEmailAndPassword(auth, document.getElementById('login-email').value, document.getElementById('login-senha').value).catch(e => alert("Erro: " + e.message));
        };

        window.ativarVaga = async () => {
            const placa = document.getElementById('placa-view').innerText;
            if (placa === "SELECIONE") return alert("Escolha um veículo primeiro!");
            const vH = parseFloat(document.getElementById('zona-select').value);
            const h = parseInt(document.getElementById('tempo-select').value);
            if (saldoLocal < vH) return alert("Saldo insuficiente!");

            await update(ref(db, `usuarios/${currentUser.uid}/vagaAtiva`), { 
                placa, inicio: Date.now(), valorHora: vH, final: Date.now() + (h * 3600000) 
            });
        };

        window.mudarAba = (id, b) => {
            document.querySelectorAll('.aba-content').forEach(a => a.classList.remove('active'));
            document.getElementById(id).classList.add('active');
        };

        // Funções de Veículo simplificadas
        window.salvarNovoVeiculo = async () => {
            const p = document.getElementById('input-placa').value.toUpperCase();
            if(p.length < 7) return alert("Placa inválida");
            await push(ref(db, `usuarios/${currentUser.uid}/veiculos`), { placa: p, modelo: document.getElementById('input-modelo').value });
            document.getElementById('input-placa').value = "";
        };

        function carregarVeiculos(uid) {
            onValue(ref(db, `usuarios/${uid}/veiculos`), (snap) => {
                const list = document.getElementById('lista-veiculos'); list.innerHTML = "";
                const data = snap.val(); if (!data) return;
                Object.entries(data).forEach(([id, v]) => {
                    list.innerHTML += `<div class="card-app flex justify-between items-center mb-2"><div><b>${v.placa}</b></div><button onclick="selecionarPlaca('${v.placa}')" class="bg-blue-600 text-white px-4 py-2 rounded-lg text-xs font-bold">USAR</button></div>`;
                });
            });
        }
        window.selecionarPlaca = (p) => { document.getElementById('placa-view').innerText = p; mudarAba('aba-estacionar'); };
    </script>
</body>
</html>
