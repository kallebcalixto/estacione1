<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ESTACIONE COLOMBO - Área Azul</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        * { -webkit-tap-highlight-color: transparent; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background-color: #f3f4f6; padding-bottom: 90px; overflow-x: hidden; width: 100%; }
        .zazul-green { background-color: #15711b; }
        .zazul-text-green { color: #15711b; }
        .btn-zazul { background-color: #15711b; color: white; border-radius: 1rem; font-weight: 700; text-transform: uppercase; }
        .aba-content { display: none; width: 100%; }
        .aba-content.active { display: block; }
        .card-app { background: white; border-radius: 1.25rem; padding: 1.25rem; border: 1px solid #e5e7eb; }
        .loading-pulse { animation: pulse 1.5s infinite; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.5; } 100% { opacity: 1; } }
    </style>
</head>
<body>

    <div id="tela-login" class="fixed inset-0 z-[100] bg-white flex flex-col p-6 items-center justify-center">
        <div class="w-full max-w-md space-y-6 text-center">
            <div class="zazul-green w-20 h-20 rounded-3xl mx-auto flex items-center justify-center shadow-lg">
                <span class="text-white text-4xl font-black">E</span>
            </div>
            <h2 class="text-2xl font-black zazul-text-green uppercase">Entrar no Sistema</h2>
            <div class="space-y-3">
                <input type="email" id="login-email" placeholder="E-mail" class="w-full p-4 border rounded-2xl font-bold bg-gray-50 outline-none focus:ring-2 focus:ring-green-600">
                <input type="password" id="login-senha" placeholder="Senha" class="w-full p-4 border rounded-2xl font-bold bg-gray-50 outline-none focus:ring-2 focus:ring-green-600">
                <button onclick="window.fazerLogin()" class="w-full btn-zazul py-4 text-lg shadow-lg">Acessar Conta</button>
                <button onclick="window.recuperarSenha()" class="text-xs font-bold text-gray-400 uppercase">Esqueci minha senha</button>
            </div>
        </div>
    </div>

    <header class="zazul-green text-white p-4 flex justify-between items-center sticky top-0 z-40">
        <div class="w-10"></div> 
        <h1 class="text-lg font-black tracking-widest uppercase">Estacione Colombo</h1>
        <button onclick="window.fazerLogout()" class="text-[10px] font-bold border border-white/30 px-3 py-1 rounded-lg">Sair</button>
    </header>

    <main id="app-container" class="max-w-md mx-auto p-4 space-y-4">
        
        <section id="aba-estacionar" class="aba-content active space-y-4">
            <div class="card-app text-center py-6">
                <p class="text-gray-500 font-bold text-sm uppercase">Saldo Disponível</p>
                <h2 class="text-4xl font-black text-black my-2" id="saldo-display">R$ 0,00</h2>
                <button onclick="mudarAba('aba-recarga')" class="mt-4 btn-zazul px-8 py-4 w-full text-base">Comprar Créditos</button>
            </div>

            <div id="form-estacionar" class="space-y-4">
                <div class="card-app bg-gray-50 border-dashed border-2 text-center">
                    <p class="text-[10px] font-bold text-gray-400 uppercase">Veículo Selecionado</p>
                    <h3 class="text-3xl font-black text-black tracking-tighter" id="placa-view">SELECIONE</h3>
                </div>

                <div id="localizacao-box" class="w-full p-4 border rounded-2xl font-bold text-sm bg-gray-100 text-gray-500 text-center border-gray-200">
                    <span id="txt-local" class="loading-pulse">📍 OBTENDO LOCALIZAÇÃO...</span>
                </div>

                <div class="grid grid-cols-2 gap-3">
                    <select id="zona-select" class="w-full p-4 border rounded-2xl font-bold text-sm bg-white border-gray-200">
                        <option value="">Aguardando GPS...</option>
                    </select>
                    <select id="tempo-select" class="w-full p-4 border rounded-2xl font-bold text-sm bg-white border-gray-200">
                        <option value="1">1 Hora</option>
                        <option value="2">2 Horas</option>
                    </select>
                </div>
                <button id="btn-estacionar-main" onclick="ativarVaga()" class="w-full btn-zazul py-5 text-lg opacity-50 pointer-events-none">Aguardando Localização...</button>
            </div>

            <div id="vaga-ativa-box" class="hidden space-y-4">
                <div class="card-app border-2 border-green-600 text-center bg-green-50/30">
                    <p class="text-green-600 font-black text-xs uppercase">Vaga Ativa</p>
                    <h3 id="placa-ativa-label" class="text-4xl font-black my-3">---</h3>
                    <div class="grid grid-cols-2 gap-4 mt-4 border-t pt-4">
                        <div><p class="text-[10px] text-gray-400 font-bold uppercase">Custo</p><span id="valor-correndo" class="font-black text-xl">R$ 0,00</span></div>
                        <div><p class="text-[10px] text-gray-400 font-bold uppercase">Restante</p><span id="cronometro" class="font-black text-xl text-blue-600">00:00</span></div>
                    </div>
                </div>
                <button onclick="sairDaVaga()" class="w-full bg-red-600 text-white py-5 rounded-2xl font-black uppercase">Encerrar Vaga</button>
            </div>
        </section>
        
        </main>

    <nav class="nav-bottom fixed bottom-0 left-0 right-0 bg-white border-t p-4 flex justify-around">
        <button onclick="mudarAba('aba-veiculos')" class="text-xs font-bold text-gray-500">CARROS</button>
        <button onclick="mudarAba('aba-estacionar')" class="text-xs font-bold text-green-700">INÍCIO</button>
        <button onclick="mudarAba('aba-historico')" class="text-xs font-bold text-gray-500">RECIBOS</button>
    </nav>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, onAuthStateChanged, signInWithEmailAndPassword, signOut, sendPasswordResetEmail } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getDatabase, ref, onValue, update, remove, push } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = { 
            apiKey: "AIzaSyDS2D6-KCvsJomst0m2qs3J93UEq3kWw1Q", 
            authDomain: "estacione-6cfbf.firebaseapp.com", 
            databaseURL: "https://estacione-6cfbf-default-rtdb.firebaseio.com", 
            projectId: "estacione-6cfbf", 
            appId: "1:490946040222:web:0071714b8e6d645459468f" 
        };
        
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getDatabase(app);

        // --- FUNÇÕES DE LOGIN (TORNAR GLOBAIS) ---
        window.fazerLogin = () => {
            const email = document.getElementById('login-email').value;
            const senha = document.getElementById('login-senha').value;
            if(!email || !senha) return alert("Preencha todos os campos");
            
            signInWithEmailAndPassword(auth, email, senha)
                .then(() => { console.log("Logado!"); })
                .catch(e => alert("Erro ao entrar: " + e.message));
        };

        window.recuperarSenha = () => {
            const email = prompt("E-mail para recuperação:");
            if (email) sendPasswordResetEmail(auth, email).then(() => alert("E-mail enviado!"));
        };

        window.fazerLogout = () => {
            if(confirm("Sair do app?")) signOut(auth).then(() => location.reload());
        };

        // --- MONITOR DE AUTENTICAÇÃO ---
        onAuthStateChanged(auth, (user) => {
            if (user) {
                document.getElementById('tela-login').style.display = 'none';
                console.log("Usuário ativo:", user.email);
                // Iniciar carregamento de dados e GPS aqui
                iniciarApp(user.uid);
            } else {
                document.getElementById('tela-login').style.display = 'flex';
            }
        });

        // --- LÓGICA DO APP ---
        function iniciarApp(uid) {
            // Monitorar Saldo e Vagas
            onValue(ref(db, `usuarios/${uid}`), (snap) => {
                const d = snap.val();
                document.getElementById('saldo-display').innerText = `R$ ${(d?.saldo || 0).toFixed(2).replace('.',',')}`;
                // ... lógica de vaga ativa ...
            });
            
            // Iniciar GPS
            verificarLocalizacao();
        }

        // --- GPS E REGRAS DE ZONA ---
        function verificarLocalizacao() {
            if (!navigator.geolocation) return;
            navigator.geolocation.watchPosition(async (pos) => {
                const { latitude, longitude } = pos.coords;
                try {
                    const res = await fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${latitude}&lon=${longitude}`);
                    const data = await res.json();
                    const ruaGps = (data.address.road || "").toLowerCase();
                    
                    // Lógica de ativação do botão baseada na rua (comparar com o banco do admin)
                    atualizarInterfaceGps(ruaGps);
                } catch(e) { console.error(e); }
            }, null, { enableHighAccuracy: true });
        }

        function atualizarInterfaceGps(rua) {
            const txt = document.getElementById('txt-local');
            const btn = document.getElementById('btn-estacionar-main');
            if(rua) {
                txt.innerText = "📍 LOCAL: " + rua.toUpperCase();
                txt.classList.remove('loading-pulse');
                // Aqui você deve cruzar com as zonasAdmin do Firebase
            }
        }

        window.mudarAba = (id) => {
            document.querySelectorAll('.aba-content').forEach(a => a.classList.remove('active'));
            document.getElementById(id).classList.add('active');
        };

    </script>
</body>
</html>
