<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ADMIN - Cadastro Área Azul</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 p-4">
    <div class="max-w-2xl mx-auto space-y-6">
        <header class="bg-blue-900 text-white p-6 rounded-2xl shadow-lg">
            <h1 class="text-2xl font-bold uppercase">Gestão de Ruas</h1>
            <p class="text-blue-200 text-sm font-bold">Configure Setores, Valores e Horas Máximas</p>
        </header>

        <div class="bg-white p-6 rounded-2xl shadow-sm border space-y-4">
            <h3 class="font-black text-gray-700 uppercase text-sm">Novo Local</h3>
            
            <div id="status-gps" class="text-center p-2 bg-gray-50 rounded-lg text-[10px] font-mono text-gray-500">
                Aguardando comando...
            </div>

            <div class="grid grid-cols-1 gap-4">
                <input type="text" id="admin-rua" placeholder="Rua (Pelo GPS)" class="p-4 border rounded-xl font-bold bg-gray-50 outline-none" readonly>
                
                <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                    <input type="text" id="admin-setor" placeholder="Setor (Ex: A)" class="p-4 border rounded-xl font-bold outline-none focus:ring-2 focus:ring-blue-500">
                    <input type="number" id="admin-preco" placeholder="Preço/Hora (Ex: 3.00)" step="0.01" class="p-4 border rounded-xl font-bold outline-none focus:ring-2 focus:ring-blue-500">
                    
                    <select id="admin-horas-max" class="p-4 border rounded-xl font-bold bg-white outline-none focus:ring-2 focus:ring-blue-500">
                        <option value="1">Limite: 1 Hora</option>
                        <option value="2">Limite: 2 Horas</option>
                    </select>
                </div>

                <div class="grid grid-cols-2 gap-2">
                    <button onclick="capturarLocalizacao()" class="bg-blue-600 text-white font-black py-4 rounded-xl hover:bg-blue-700 uppercase text-xs">
                        📍 Localizar Rua
                    </button>
                    <button onclick="salvarZona()" id="btn-salvar" class="bg-green-600 text-white font-black py-4 rounded-xl hover:bg-green-700 uppercase text-xs opacity-50 pointer-events-none">
                        Gravar no Banco
                    </button>
                </div>
            </div>
        </div>

        <div class="bg-white p-6 rounded-2xl shadow-sm border">
            <h3 class="font-black text-gray-700 uppercase text-sm mb-4">Ruas no Firebase:</h3>
            <div id="lista-zonas-admin" class="space-y-2">
                <p class="text-center text-gray-400 py-4 text-xs">Carregando dados...</p>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, push, onValue, remove } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = { apiKey: "AIzaSyDS2D6-KCvsJomst0m2qs3J93UEq3kWw1Q", authDomain: "estacione-6cfbf.firebaseapp.com", databaseURL: "https://estacione-6cfbf-default-rtdb.firebaseio.com", projectId: "estacione-6cfbf", appId: "1:490946040222:web:0071714b8e6d645459468f" };
        const app = initializeApp(firebaseConfig); const db = getDatabase(app); const dbRef = ref(db, 'configuracoes_zonas');

        window.capturarLocalizacao = () => {
            const status = document.getElementById('status-gps');
            status.innerText = "⏳ Localizando...";
            navigator.geolocation.getCurrentPosition((pos) => {
                fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${pos.coords.latitude}&lon=${pos.coords.longitude}`)
                .then(r => r.json()).then(data => {
                    const rua = data.address.road || "Rua não identificada";
                    document.getElementById('admin-rua').value = rua.trim();
                    status.innerText = "✅ Rua Identificada!";
                    document.getElementById('btn-salvar').classList.remove('opacity-50', 'pointer-events-none');
                })
                .catch(() => status.innerText = "❌ Erro GPS");
            }, () => alert("Ative o GPS!"), { enableHighAccuracy: true });
        };

        window.salvarZona = async () => {
            const rua = document.getElementById('admin-rua').value.trim();
            const setor = document.getElementById('admin-setor').value.trim();
            const preco = parseFloat(document.getElementById('admin-preco').value);
            const horasMax = parseInt(document.getElementById('admin-horas-max').value);
            if(!rua || !setor || isNaN(preco)) return alert("Preencha tudo!");
            await push(dbRef, { rua, setor, preco, horasMaximas: horasMax, criadoEm: Date.now() });
            alert("Salvo!");
            location.reload();
        };

        onValue(dbRef, (snap) => {
            const lista = document.getElementById('lista-zonas-admin'); lista.innerHTML = "";
            const dados = snap.val();
            if(dados) {
                Object.entries(dados).forEach(([id, zona]) => {
                    lista.innerHTML += `
                        <div class="flex justify-between items-center p-4 bg-gray-50 rounded-xl border border-gray-100 mb-2">
                            <div>
                                <p class="font-black text-gray-800 text-sm">${zona.rua}</p>
                                <p class="text-[10px] font-bold text-blue-600 uppercase">SETOR ${zona.setor} | R$ ${zona.preco.toFixed(2)}/h | Limite: ${zona.horasMaximas || 1}h</p>
                            </div>
                            <button onclick="removerZona('${id}')" class="text-red-500 font-bold text-[10px] border border-red-100 px-2 py-1 rounded-lg">APAGAR</button>
                        </div>`;
                });
            }
        });
        window.removerZona = (id) => { if(confirm("Apagar?")) remove(ref(db, `configuracoes_zonas/${id}`)); };
    </script>
</body>
</html>
